# ── Spatial expression figure configuration ────────────────────────────────
# Edit this file to change figure parameters without touching the scripts.

# Input data
h5ad_path: data/Spatial/slide_seq/All_RCTD_types_singlet_score_0_slide_seq_15_named.h5ad

# Samples to compare (order = left panel, right panel)
samples:
  - id: B14
    label: "OIL"
  - id: B03
    label: "CORT"

# Gene to visualise (gene_symbol, case-sensitive)
gene: Sgk1

# Cell class to highlight in the foreground layer.
# Options: "Glut", "Gaba", "IMN", "Non-Neuron", or null to show all filtered beads.
cell_class: null

# Cell subclass to highlight (takes precedence over cell_class if set).
# Use the subclass label derived from RCTD_first_type_rat, e.g. "Oligo_NN", "CA3_Glut".
# Set to null to fall back to cell_class.
cell_subclass: "Oligo_NN"

# ── Quality filters ─────────────────────────────────────────────────────────
neuron_score_threshold: 330      # applied to neurons (Glut, Gaba, IMN)
non_neuron_score_threshold: 330  # applied to non-neurons (singlet class only)

# ── Visual parameters ────────────────────────────────────────────────────────
dot_size_bg: 10.0    # background beads (all quality-filtered, gray)
dot_size_fg: 40.0    # foreground beads (selected cell type, colored)
bg_color: "#CCCCCC"
fg_zero_color: "#732B8B"  # color for selected beads with zero expression
colormap: "#FFED94:#FFD400"  # "#start:#end" → linear colormap; or any matplotlib colormap name

# ── Crop ─────────────────────────────────────────────────────────────────────
# Set to true to apply the rectangular crop defined in conf/hemisphere_params.json.
use_crop: true

# ── Figure layout ────────────────────────────────────────────────────────────
fig_width: 10
fig_height: 10
dpi: 300
scale_bar_um: 500   # length of scale bar in micrometres
text_scale: 2.0     # multiply all font sizes by this factor (e.g. 2.0 to double)

# ── Panel assembly ───────────────────────────────────────────────────────────
row_gap_pt: 50      # gap between panel rows in PDF points (~1000 µm at figure scale)
row_dot_sizes: [null, 70.0]  # per-row foreground dot size override; null = use dot_size_fg above

# ── Output ───────────────────────────────────────────────────────────────────
processed_csv: data/processed/spatial_expression_{gene}.csv
output_svg: figures/fig_spatial_{gene}_{cell_type}_v1.svg
